<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Invoice</title>
    <!-- Add Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

     <!-- Custom Styles -->
     <style>
        body {
            background-color: #f8f9fa;
        }
        h1 {
            font-weight: 600;
            color: #343a40;
        }
        form {
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }
        label.form-label, .form-check-label {
            font-weight: 500;
        }
        .form-control, .form-select {
            border-radius: 8px;
        }
        .btn-primary {
            padding: 10px 30px;
            border-radius: 30px;
            font-weight: 600;
        }
        .btn-secondary {
            border-radius: 20px;
        }
        .form-check-inline {
            margin-right: 15px;
        }
        .mb-3, .form-group {
            margin-bottom: 1.2rem !important;
        }
    </style>

</head>

<body>
    <div class="container py-5">
        <h1 class="text-center mb-5">Edit Invoice</h1>
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <!-- Your <form> goes here -->
                    <div class="mt-3">
                        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Back to Dashboard</a>
                    </div>
                    <!-- Edit Invoice Form -->
                    <form action="{{ url_for('edit_invoice', id=invoice.id) }}" method="post">
                        <!-- Invoice Date -->
                        <div class="mb-3">
                            <label for="invoice_date" class="form-label">Invoice Date:</label>
                            <input type="date" id="invoice_date" name="invoice_date" class="form-control" value="{{ invoice.invoice_date }}" required>
                        </div>
            
                        <!-- Date Invoice Received -->
                        <div class="mb-3">
                            <label for="date_received" class="form-label">Date Invoice Received:</label>
                            <input type="date" id="date_received" name="date_received" class="form-control" value="{{ invoice.date_received }}" required>
                        </div>
            
                        <!-- Vendor (Readonly to prevent editing) -->
                        <div class="mb-3">
                            <label for="vendor" class="form-label">Vendor:</label>
                            <input type="text" id="vendor" name="vendor" class="form-control" value="{{ invoice.vendor }}" readonly required>
                        </div>
            
                        <div class="mb-3">
                            <label for="mobile_no" class="form-label">Mobile No:</label>
                            <input type="text" id="mobile_no" name="mobile_no" class="form-control" value="{{ invoice.mobile_no if invoice else '' }}">
                        </div>
                        
                        <!-- Invoice Number -->
                        <div class="mb-3">
                            <label for="invoice_number" class="form-label">Invoice Number:</label>
                            <input type="text" id="invoice_number" name="invoice_number" class="form-control" value="{{ invoice.invoice_number }}" required>
                        </div>
                        <!-- Purchase Order Approved -->
                        <div class="mb-3">
                            <label for="po_approved" class="form-label">Purchase Order Approved:</label><br>
                            <input type="radio" id="po_approved_yes" name="po_approved" value="Yes" 
                                {% if invoice.get('po_approved', '') == 'Yes' %} checked {% endif %} required>
                            <label for="po_approved_yes">Yes</label><br>
                            <input type="radio" id="po_approved_no" name="po_approved" value="No" 
                                {% if invoice.get('po_approved', '') == 'No' %} checked {% endif %} required>
                            <label for="po_approved_no">No</label>
                        </div>            
            
                        <!-- PO Number -->
                        <div class="mb-3">
                            <label for="invoice_number" class="form-label">PO Number:</label>
                            <input type="text" id="po_number" name="po_number" class="form-control" value="{{ invoice.po_number }}" required>
                        </div>
            
                        <!-- Date of Expiry Purchase Order (PO) -->
                        <div class="mb-3">
                            <label for="po_expiry_date" class="form-label">Date of Expiry Purchase Order (PO):</label>
                            <input type="date" id="po_expiry_date" name="po_expiry_date" class="form-control" 
                                value="{{ invoice.get('po_expiry_date', '') }}">
                        </div>
            
                        <!-- Whether Agreement is Signed -->
                        <div class="mb-3">
                            <label for="agreement_signed" class="form-label">Agreement Signed:</label><br>
                            <input type="radio" id="agreement_signed_yes" name="agreement_signed" value="Yes" 
                                {% if invoice.get('agreement_signed') == 'Yes' %} checked {% endif %} required>
                            <label for="agreement_signed_yes">Yes</label><br>
                            <input type="radio" id="agreement_signed_no" name="agreement_signed" value="No" 
                                {% if invoice.get('agreement_signed') == 'No' %} checked {% endif %} required>
                            <label for="agreement_signed_no">No</label>
                        </div>
            
                        <!-- Date of Agreement Signed -->
                        <!-- Date of Agreement Signed -->
                        <div class="mb-3">
                            <label for="agreement_signed_date" class="form-label">Date of Agreement Signed:</label>
                            <input type="date" id="agreement_signed_date" name="agreement_signed_date" class="form-control" 
                                value="{{ invoice.get('agreement_signed_date', '') }}">
                        </div>
            
                        <div class="form-group">
                            <label for="msme">MSME</label><br>
                            <input type="radio" id="msme_yes" name="msme" value="Yes" {% if invoice.msme == 'Yes' %}checked{% endif %}>
                            <label for="msme_yes">Yes</label><br>
                            <input type="radio" id="msme_no" name="msme" value="No" {% if invoice.msme == 'No' %}checked{% endif %}>
                            <label for="msme_no">No</label>
                        </div>
                        
                        <!-- Date of Submission -->
                        <div class="mb-3">
                            <label for="date_submission" class="form-label">Date of Submission:</label>
                            <input type="date" id="date_submission" name="date_submission" class="form-control" value="{{ invoice.date_submission }}" required>
                        </div>
            
                        <!-- Whether ISD -->
                        <div class="mb-3">
                            <label for="isd" class="form-label">ISD</label>
                            <select class="form-select" id="isd" name="isd" required>
                                <option value="No" {% if invoice.isd == 'No' %}selected{% endif %}>No</option>
                                <option value="Yes" {% if invoice.isd == 'Yes' %}selected{% endif %}>Yes</option>
                            </select>
                        </div>
            
            
                        <div class="mb-3">
                            <label for="approved_by" class="form-label">Approved By:</label>
                            <select id="approved_by" name="approved_by" class="form-control">
                                {% for value in approved_by_values %}
                                    <option value="{{ value }}" 
                                        {% if invoice.get('approved_by') == value %} selected {% endif %}>
                                        {{ value }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
            
            
                        <div class="mb-3">
                            <label for="hod_values" class="form-label">HOD Approval:</label>
                            <select id="hod_values" name="hod_values" class="form-control">
                                {% for value in hod_values %}
                                    <option value="{{ value }}" 
                                        {% if invoice.get('hod_values') == value %} selected {% endif %}>
                                        {{ value }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>            
            
                        <div class="mb-3">
                            <label for="ceo_values" class="form-label">CEO Approval:</label>
                            <select id="ceo_values" name="ceo_values" class="form-control">
                                {% for value in ceo_values %}
                                    <option value="{{ value }}" 
                                        {% if invoice.get('ceo_values') == value %} selected {% endif %}>
                                        {{ value }}
                                    </option>
                                {% endfor %}
                            </select>
            
                        <div class="mb-3">
                            <label for="reviewed_by" class="form-label">Invoice Owner:</label>
                            <select id="reviewed_by" name="reviewed_by" class="form-control">
                                {% for value in reviewed_by_values %}
                                    <option value="{{ value }}" 
                                        {% if invoice.get('reviewed_by') == value %} selected {% endif %}>
                                        {{ value }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
            
                        <div class="mb-3">
                            <label for="created_by" class="form-label">Prepared By:</label>
                            <select id="created_by" name="created_by" class="form-control" required>
                                {% for value in created_by_values %}
                                    <option value="{{ value }}" 
                                        {% if invoice.get('created_by') == value %} selected {% endif %}>
                                        {{ value }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>            
            
                        <div class="mb-3">
                            <label for="tag1" class="form-label">TAG 1:</label>
                            <select id="tag1" name="tag1" class="form-control">
                                {% for value in tag1 %}
                                    <option value="{{ value }}" 
                                        {% if invoice.get('tag1') == value %} selected {% endif %}>
                                        {{ value }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
            
                        <div class="mb-3">
                            <label for="tag2" class="form-label">TAG 2:</label>
                            <select id="tag2" name="tag2" class="form-control">
                                {% for value in tag2 %}
                                    <option value="{{ value }}" 
                                        {% if invoice.get('tag2') == value %} selected {% endif %}>
                                        {{ value }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>            
            
                        Invoice Cleared (Yes/No)
                        <div class="mb-3">
                            <label for="invoice_cleared" class="form-label">Invoice Cleared:</label><br>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="invoice_cleared" id="invoice_cleared_no" value="No" 
                                {% if invoice.invoice_cleared == 'No' %}checked{% endif %} required>
                                <label class="form-check-label" for="invoice_cleared_no">No</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="invoice_cleared" id="invoice_cleared_yes" value="Yes" 
                                {% if invoice.invoice_cleared == 'Yes' %}checked{% endif %}>
                                <label class="form-check-label" for="invoice_cleared_yes">Yes</label>
                            </div>
                        </div>
            
                        <!-- Invoice Cleared Date (Hidden unless 'Yes' is selected) -->
                        <div class="mb-3" id="cleared_date_div" {% if invoice.invoice_cleared != 'Yes' %}hidden{% endif %}>
                            <label for="invoice_cleared_date" class="form-label">Invoice Cleared Date:</label>
                            <input type="date" id="invoice_cleared_date" name="invoice_cleared_date" class="form-control"
                                value="{{ invoice.invoice_cleared_date }}">
                        </div>
            
                        <!-- Invoice Amount -->
                        <div class="mb-3">
                            <label for="invoice_amount" class="form-label">Invoice Amount:</label>
                            <input type="number" step="0.01" id="invoice_amount" name="invoice_amount" class="form-control" value="{{ invoice.invoice_amount }}" required>
                        </div>
            
                        <!-- GST Amount -->
                        <div class="mb-3">
                            <label for="gst" class="form-label">GST Amount:</label>
                            <input type="number" step="0.01" id="gst" name="gst" class="form-control" value="{{ invoice.gst }}" required>
                        </div>
            
                        <!-- Total Amount (Invoice Amount + GST) -->
                        <div class="mb-3">
                            <label for="total_amount" class="form-label">Total Amount (Including GST):</label>
                            <input type="number" step="0.01" id="total_amount" name="total_amount" class="form-control" value="{{ invoice.total_amount }}">
                        </div>
            
                        <!-- Submit Button -->
                        <div class="text-center">
                            <button type="submit" class="btn btn-success">Update Invoice</button>
                        </div>
                    </form>
            
                    <!-- Back Button -->
                    <div class="mt-3 text-center">
                        <a href="{{ url_for('index') }}" class="btn btn-secondary">Back to Invoice List</a>
                    </div>
                </div>
            
                <!-- jQuery script to toggle visibility of Invoice Cleared Date and calculate Total Amount -->
                <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
                <script>
                    $(document).ready(function() {
                        // Show or hide the Invoice Cleared Date field
                        $('input[name="invoice_cleared"]').change(function() {
                            if ($(this).val() === 'Yes') {
                                $('#cleared_date_div').removeAttr('hidden');
                            } else {
                                $('#cleared_date_div').attr('hidden', 'hidden');
                                $('#invoice_cleared_date').val('');
                            }
                        });
            
                        // Automatically calculate the total amount (Invoice Amount + GST)
                        $('#invoice_amount, #gst').on('input', function() {
                            var invoiceAmount = parseFloat($('#invoice_amount').val()) || 0;
                            var gstAmount = parseFloat($('#gst').val()) || 0;
                            var totalAmount = invoiceAmount + gstAmount;
                            $('#total_amount').val(totalAmount.toFixed(2));
                        });
            
                        // Redirect to dashboard after downloading the PDF
                        $('form').on('submit', function(event) {
                            // Wait for a few seconds before redirecting to the dashboard to allow the PDF to download
                            setTimeout(function() {
                                window.location.href = "/dashboard";
                            }, 3000);  // 3-second delay before redirection
                        });
                    });
                </script>
            
                <!-- Add Bootstrap 5 JS and Popper.js -->
                <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
                <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
            
            </div>
        </div>
    </div>
</body>

</html>
