<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Users</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2>Manage Users</h2>

    <div class="mt-3">
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Back to Dashboard</a>
    </div>

    <!-- Add New User -->
    <form action="{{ url_for('add_user') }}" method="POST" class="mb-4">
        <div class="row">
            <div class="col-md-3">
                <input type="text" name="name" class="form-control" placeholder="Name" required>
            </div>
            <div class="col-md-3">
                <input type="email" name="email" class="form-control" placeholder="Email" required>
            </div>
            <div class="col-md-3">
                <select name="role" class="form-control" required>
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                    <option value="superadmin">Super Admin</option>
                </select>
            </div>
            <div class="col-md-3">
                <button type="submit" class="btn btn-primary">Add User</button>
            </div>
        </div>
    </form>

    <!-- Users Table -->
    <table class="table table-bordered">
        <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        {% for user in users %}
        <tr>
            <td>{{ user.name }}</td>
            <td>{{ user.email }}</td>
            <td>
                <form action="{{ url_for('update_user_role', user_id=user.id) }}" method="POST" class="d-flex">
                    <select name="role" class="form-select form-select-sm me-2">
                        <option value="user" {% if user.role == 'user' %}selected{% endif %}>User</option>
                        <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Admin</option>
                        <option value="superadmin" {% if user.role == 'superadmin' %}selected{% endif %}>Super Admin</option>
                    </select>
                    <button type="submit" class="btn btn-sm btn-success">Update</button>
                </form>
            </td>
            <td>{{ 'Active' if user.is_active else 'Inactive' }}</td>
            <td>
                <form action="{{ url_for('toggle_user_status', user_id=user.id) }}" method="POST" style="display:inline-block">
                    <button class="btn btn-sm btn-warning">{{ 'Deactivate' if user.is_active else 'Activate' }}</button>
                </form>
                <form action="{{ url_for('delete_user', user_id=user.id) }}" method="POST" style="display:inline-block" onsubmit="return confirm('Are you sure?')">
                    <button class="btn btn-sm btn-danger">Delete</button>
                </form>
            </td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
