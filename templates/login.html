<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">
    <!--<link href="../static/css/login.css" rel="stylesheet">-->
    <link href="{{ url_for('static', filename='css/login.css') }}" rel="stylesheet">
</head>

<body>
    <main class="main">
        <!-- Hero Section -->
        <section id="hero" class="hero section">
            <img src="{{ url_for('static', filename='images/Auxilo-logo.svg') }}" alt="">
            <div class="container">
                <div class="row">
                    <div class="col-lg-10">
                        <div class="logo"><img src="{{ url_for('static', filename='images/Auxilo-logo.svg') }}" alt=""></div>
                        <h2 data-aos="fade-up">Hi there,</h2>
                        <h2 data-aos="fade-up" data-aos-delay="200"><span>Log in</span> to see how the</h2>
                        <h2 data-aos="fade-up" data-aos-delay="200"><span>Customers</span> feel about us!</h2>
                    </div>
                    <div class="col-lg-5" data-aos="fade-up">
                        <!-- Email Form -->
                        <form id="loginForm" class="login-form-container">
                            <div class="log-in-form form-floating">
                                <input type="email" id="email" name="Email" class="form-control" placeholder="name@example.com" required>
                                <label for="email">Enter Email address</label>
                            </div>
                            <div class="log-in-btn">
                                <input type="submit" id="email-btn" value="Get OTP">
                            </div>
                            <div id="login-loading" class="loading" style="display:none;">Loading...</div>
                            <div id="login-error-message" class="error-message" style="display:none;">Error</div>
                        </form>

                        <!-- OTP Form -->
                        <form id="otpForm" class="otp-form-container" style="display:none;">
                            <div class="otp-form form-floating">
                                <input type="password" id="otp" name="Otp" class="form-control" placeholder="OTP" required>
                                <label for="otp">Enter OTP</label>
                            </div>
                            <div class="otp-btn">
                                <input type="submit" id="otp-btn" value="Verify OTP">
                            </div>
                            <div id="otp-loading" class="loading" style="display:none;">Loading...</div>
                            <div class="error-message" id="otp-error-message" style="display:none;">Please enter the correct OTP.</div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
        const loginLoading = document.getElementById('login-loading');
        const loginError = document.getElementById('login-error-message');
        const otpLoading = document.getElementById('otp-loading');
        const otpError = document.getElementById('otp-error-message');

        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const email = document.getElementById('email').value;
            loginError.style.display = 'none';
            loginLoading.style.display = 'block';

            fetch('/send-otp', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken
                },
                body: JSON.stringify({ email: email })
            })
            .then(response => response.json())
            .then(data => {
                loginLoading.style.display = 'none';
                if (data.message === 'OTP sent successfully') {
                    document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('otpForm').style.display = 'block';
                } else {
                    loginError.textContent = data.error || 'Failed to send OTP. Please try again.';
                    loginError.style.display = 'block';
                }
            })
            .catch(error => {
                loginLoading.style.display = 'none';
                console.error('Error:', error);
                loginError.textContent = 'An error occurred. Please try again later.';
                loginError.style.display = 'block';
            });
        });

        document.getElementById('otpForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const otp = document.getElementById('otp').value;
            const email = document.getElementById('email').value;

            otpError.style.display = 'none';
            otpLoading.style.display = 'block';

            fetch('/verify-otp', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken
                },
                body: JSON.stringify({ email: email, otp: otp })
            })
            .then(response => response.json())
            .then(data => {
                otpLoading.style.display = 'none';
                if (data.valid) {
                    window.location.href = "{{ url_for('admin_dashboard') }}";
                } else {
                    otpError.textContent = data.reason === 'expired'
                        ? 'OTP expired. Please request a new one.'
                        : data.reason === 'locked'
                            ? 'Too many failed attempts. Please request a new OTP.'
                            : 'Please enter the correct OTP.';
                    otpError.style.display = 'block';
                }
            })
            .catch(error => {
                otpLoading.style.display = 'none';
                console.error('Error:', error);
                otpError.textContent = 'An error occurred. Please try again later.';
                otpError.style.display = 'block';
            });
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>

</html>
